{% extends 'insurance/base.html' %}

{% block content %}

<div class="form-box">
    <h2>Delete Insurance Policy</h2>
    <p>Are you sure you want to delete <strong>{{ policy.name }}</strong>?</p>
    <p class="muted">This will also remove customer purchases and claims connected to this policy.</p>

    <form method="post">
        {% csrf_token %}
        <button class="btn btn-danger" type="submit">Delete Policy</button>
        <a class="btn btn-secondary" href="{% url 'manage_policies' %}">Cancel</a>
    </form>
</div>

{% endblock %}
